<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Pendaftaran</title>
  <style>
      body {
          background-color: #c3dfff;
          font family: helvetica, sans-serif;
      }

    label {
        font weight: bold;
        margin bottom: 10px;
        display: block;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    select {
        width: 95%;
        padding: 10px;
        border-radius: 8px;
        border: 0.1px color #black;
    }

    button {
        background-color: #0a111a;
        color: white;
        padding: 10px;
        color: white;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 10px;
        border: none;
    }
    
    button:hover {
        background-color: #c169fc; 
    }
    
    .container {
        width: 400px;
        margin: 50px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 10px;
        box-shadow: 5px 5px 5px rgba(14, 89, 133, 0.1);
    }

      .form-group {
          margin-bottom: 20px;
      }

  </style>
</head>

<body>
    <div class="container">
      <h2 align="center">Formulir Pendaftaran</h2>      <form action="" method="post" encytype="multipart/form-data">
      <div class="form-group">
  <label for="first_name">Nama Lengkap</label>
  <input type="text" name="first_name" id="first_name" placeholder="Isi Nama Anda">
      </div>

      <div class="form-group">
  <label for="Email">Email</label>
  <input type="email" name="email" placeholder="Isi Email Anda!">
      </div>

      <div class="form-group">
  <label for="">Tanggal Lahir</label>
  <input type="date" name="'birth_date">
      </div>

      <div class="form-group">
  <label for="">Jenis Kelamin</label>
  <input type="radio" name="gender" value="L">Laki-Laki
  <input type="radio" name="gender" value="P">Perempuan
      </div>

      <div class="form-group">
  <label for="">Agama</label>
  <select name="religion" required>
    <option value="">--Pilih Agama--</option>
    <option value="Islam">Islam</option>
    <option value="Kristen">Kristen</option>
    <option value="Katolik">Katolik</option>
    <option value="Hindu">Hindu</option>
    <option value="Buddha">Buddha</option>
    <option value="Konghucu">Konghucu</option>
  </select></div>

  <div class="form-group">
  <label for="">Hobi</label>
  <div class="Hobi">
  <div><input type="checkbox"> Menggambar </div>
  <div><input type="checkbox"> Melukis </div>
  <div><input type="checkbox"> Berenang </div>
  <div><input type="checkbox"> Bermain Bola </div>

  <button type="submit">Simpan</button>
      </form>
</body>
</html>
